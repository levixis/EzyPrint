<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EzyPrint - Modern Printing Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              primary: '#FF3F33',     // New Primary Red
              primaryDark: '#E63226', // Darker shade of new primary red
              secondary: '#263238',   // Dark Blue Grey (for backgrounds, secondary elements)
              secondaryLight: '#37474F', // Lighter Blue Grey
              accent: '#FF7066',       // Accent for new primary red (e.g., lighter shade)
              text: '#F5F5F5',       // Off-white for primary text on dark backgrounds
              lightText: '#B0BEC5',   // Light Blue-Gray for secondary text
              muted: '#78909C',     // Muted Blue-Gray for borders, subtle text
              bg: '#1F2937',         // General background if not secondary (dark grey)
            },
            status: {
              success: '#4CAF50',
              warning: '#FFC107',
              error: '#F44336', 
              info: '#2196F3',
              pending: '#FF9800', 
            }
          },
          boxShadow: {
            'card': '0 5px 15px rgba(0, 0, 0, 0.2), 0 3px 8px rgba(0, 0, 0, 0.15)',
            'modal': '0 10px 30px rgba(0, 0, 0, 0.25), 0 5px 15px rgba(0, 0, 0, 0.2)',
          },
          borderRadius: {
            'xl': '0.75rem', 
          }
        }
      }
    }
  </script>
<script type="importmap">
{
  "imports": {
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1",
    "firebase/": "https://esm.sh/firebase@^11.9.1/",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react/": "https://esm.sh/react@^19.1.0/",
    "vite": "https://esm.sh/vite@^6.3.5",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^4.5.2"
  }
}
</script>
</head>
<body class="bg-brand-bg font-sans text-brand-text">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
